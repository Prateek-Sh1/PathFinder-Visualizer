<!DOCTYPE html>
<html>
<head>
    <title>Graph Visualizer</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body>
    <div class="whole">
        <div class="graph-box">
            <div class="headtxt">
                <h1>G</h1>
                <h1>r</h1>
                <h1>a</h1>
                <h1>p</h1>
                <h1>h</h1>
                <pre>  </pre>
                <h1>V</h1>
                <h1>i</h1>
                <h1>s</h1>
                <h1>u</h1>
                <h1>a</h1>
                <h1>l</h1>
                <h1>i</h1>
                <h1>z</h1>
                <h1>e</h1>
                <h1>r</h1>  
            </div>
            <div id="grid"></div>
            <div class="bttn">
                <button onclick="bfs()">Run BFS</button>
                <button onclick="dfs()">Run DFS</button>
                <button onclick="resetGrid()">Reset</button>
            </div>
        </div>

        <div class="info1">
            <i class="ri-arrow-drop-right-fill"></i>
        </div>

        <div class="info">
            <i class="ri-arrow-right-circle-fill starti" > Start Point</i>
            <i class="ri-arrow-right-circle-fill endi"> End Point</i>
            <i class="ri-arrow-right-circle-fill walli"> Wall</i>
            <i class="ri-arrow-right-circle-fill pathi"> Shortest Path</i>
        </div>

         <div class="info2">
            <i class="ri-arrow-drop-left-fill"></i>
        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
